version: 1
description: >
  Universal skill routing map.
  Authoritative keyword and invoke reference for route-guard.mjs.
  Project context and complexity gates run before this skill map.
  Sections: project context markers, project skills (luca_gstack), and built-in skills.

project_context:
  old_project_triggers: [老项目, 已有项目, 已有的项目, 旧项目, 继续项目, 上次那个项目, 接着上次, 上次的项目, 之前那个项目, 之前的项目, 之前那个]
  new_project_triggers: [新项目, 新需求, 新功能, 我想做一个需求, 我想做一个项目]
  current_project_triggers: [当前项目, 这个项目, 本项目]

# ── luca_gstack project skills ───────────────────────────────────────────────
project_skills:

  auto:
    invoke: "/auto"
    weight: 10
    triggers: [全流程, 自动做, auto, 一键, 帮我全部, 端到端, 完整设计, 全套方案, 全套功能设计, 完整功能设计, 全部搞定, 整套做]

  idea:
    invoke: "/idea"
    weight: 6
    # 仅限"已有原始语料忠实结构化"场景；新想法/方向探索一律走 /brainstorm
    triggers: [会议纪要, 会议语料, 语音稿, 语音转文字, 转文字稿, 原始语料, 讨论记录, 语料转需求, 整理这段记录, 梳理这段记录]

  brainstorm:
    invoke: "/brainstorm"
    weight: 6
    triggers: [PRD, 需求文档, 产品需求, brainstorm, 写PRD, 需求梳理, 有个想法, 原始想法, 功能方向, 一个功能, 需求分析, 需求确认, 分析需求, 想梳理, 梳理需求]

  superpowers-brainstorming:
    invoke: "superpowers:brainstorming"
    weight: 6
    triggers: [快速梳理, 轻量PRD, quick brainstorm, 简单需求梳理, superpowers brainstorm]

  deepresearch:
    invoke: "/deepresearch"
    weight: 6
    triggers: [深度研究, 调研, research, 深入研究, 全面调研, 多agent研究]
  quick_research:
    skill: quick-research
    invoke: "/quick-research"
    hint: "→ /quick-research（轻量研究：单 agent 后台查 primary source，落盘单文件；发散题升 /deepresearch）"
    weight: 6
    # 刻意窄词——"查一下"太宽会劫持日常问答；宽表述靠语义兜底
    triggers: [快速调研, 轻量研究, 查文档确认, 查一下资料, 查下官方文档, 帮我查证]

  ux_research:
    invoke: "/ux-research"
    weight: 7
    triggers: [UX研究, 竞品分析, 设计调研, 用户研究, 体验分析, UX调研]

  ux_brainstorm:
    invoke: "/ux-brainstorm"
    weight: 7
    triggers: [设计方案, UI方案, 设计brainstorm, 界面方案, UX方案]

  design_brief:
    invoke: "/design-brief"
    weight: 6
    triggers: [轻量交互, 原型决策, design brief, 方案落地, 交互文档, 落地方案, 方案细化]

  html_prototype:
    invoke: "/html-prototype"
    weight: 7
    triggers: [做个原型, 生成HTML, HTML原型, prototype, 快速原型, 原型界面, 本地原型]

  ux_audit:
    invoke: "/ux-audit"
    weight: 7
    triggers: [评审, UX问题, 页面评审, 体验评审, UX评审, 评审这个页面, 挑毛病, 有什么问题, 给建议]

  figma_layer:
    invoke: "/figma-layer"
    weight: 5
    triggers: [Figma, figma, 保险层, 推到figma, figma保险]

  # figma_demo / compare / magicpath 2026-07-03 移出一级路由（全量搭建 review P2-6，
  # framework-audit/2026-07-03-full-review.md）：近30天 episodic skills_used 零调用，
  # 降级为隐藏 skill（磁盘目录/命令逻辑零删除，仅撤销 /office 展示+关键词触发+slash
  # command 入口；仍可被 open-design/design-brief/html-prototype 等内部 Skill 工具按
  # 名 dispatch，如 open-design 的界面产出备选链）。见 CLAUDE.md「隐藏/高级 skill」。

  open_design:
    invoke: "/open-design"
    weight: 8
    # 这里只列「Open Design / OD」产品名提及，作为粗匹配粗网（与 design_brief「交互文档」/
    # figma_layer「figma」隔离；禁用裸 "od"——substring 会误中 product/model/method）。
    # 【单点交接】"把刚产出的 md 给 OD" 不在此写死交接措辞：它是【语义识别】，由 Claude 按
    # CLAUDE.md「单点交接到 OD」规则结合上下文理解意图后路由（用户要求：结合语义，不靠词表）。
    triggers: [Open Design, open design, opendesign, OpenDesign, OD生成, OD出图, OD设计, OD原型, 用OD做]

  tech_spec:
    invoke: "/tech-spec"
    weight: 7
    triggers: [工程规格, 技术文档, tech spec, engineering spec, 技术合同, 工程合同, 开发规格, 技术规格]

  task_plan:
    invoke: "/task-plan"
    weight: 7
    triggers: [任务编排, 任务计划, 开发计划, task plan, 拆任务, 任务拆解, 编排任务, 开发编排, 任务分解]

  code_hygiene:
    invoke: "/code-hygiene"
    weight: 6
    # 工程域代码约束（非设计 skill）。Iron Law 完成前验证 + 8 清理算子。
    triggers: [代码清理, 清理代码, 死代码, 删死代码, 代码去重, 弱类型, 代码质量, 代码体检, 工程体检, 完成前验证, 代码审查, cleanup, code-hygiene, 清理冗余]

  code_recon:
    invoke: "/code-recon"
    weight: 6
    # Brownfield 正门（非设计 skill）：现有代码 → 架构 brief → 喂设计管线。触发全为复合短语，
    # 语义锁「理解/读懂现有代码结构」，与 code_hygiene(清理/死代码)、systematic-debugging(调试/找bug)、
    # deepresearch(联网调研) 隔离；不含裸"代码"单字避免广撞。
    triggers: [理解现有代码, 读懂代码库, 读懂现有代码, 摸清代码结构, 现有代码结构, 基于现有代码, 逆向现有代码, 代码结构梳理, 读一下这个代码库, 理解这个代码库, brownfield]

  muse_loop_orchestrate:
    invoke: "/muse-loop-orchestrate"
    weight: 7
    # muse 专属（需求→原型自治 Loop 编排器）。触发短语全部为复合词，
    # 不含裸"需求"/"原型"单字——避免撞 brainstorm(需求)/html-prototype·design-brief·
    # magicpath·open-design(原型) 的现有词条。不缩写成"loop"，避免撞内置 loop 定时调度 skill。
    triggers: [muse loop, muse自进化循环, 需求到原型闭环, 跑一下muse loop]

  muse_req_triage:
    invoke: "/muse-req-triage"
    weight: 6
    # muse 专属。/brainstorm 一次只吃一个输入(md路径/单个话题字符串)，
    # 缺一道"批量候选需求先筛一遍再决定投入哪条"的便宜前置筛选——本条补这个缺口，
    # 不与 brainstorm/idea 竞争同一场景。复合触发短语，避免裸"需求"单字。
    triggers: [候选需求批量筛选, 需求清单先筛一遍, 一堆需求要不要做, 批量需求triage, 需求batch筛选]

  insight_synthesis:
    invoke: "/insight-synthesis"
    weight: 6
    # 一手定性综合：用户提供的访谈/工单/回访 → observation(原文引用)+interpretation(置信度)两层。
    # 研究段第三"对象角度"（内部一手）。与 idea 划界=忠实vs解读；与 muse-req-triage 靠意图消歧(筛/综合)。
    # 复合触发短语，避免裸"用户"单字（撞 ux-research）。
    triggers: [访谈综合, 访谈洞察, 工单综合, 定性综合, 一手资料提炼洞察, 把访谈变成洞察, 区分观察与解读, 亲和图]

# ── Built-in Claude Code skills (globally installed) ─────────────────────────
builtin_skills:

  web_access:
    skill: web-access
    hint: "→ 建议使用内置 skill: web-access（联网搜索/网页抓取）"
    weight: 9
    # 2026-07-13 fable review 遗留修复 + 同日复发修复：≤3 字裸动词短语必子串误撞复合词——
    # '搜索'撞"搜索功能"、'查一下'撞"审查一下/检查一下/排查一下"、'找找'撞"找找原因"（均实测）。
    # 一律意图锚定形；裸祈使（"查一下天气"）落 STOP 由语义契约兜底。
    triggers: [搜索一下, 帮我搜索, 网上搜, 帮我查一下, 上网, 联网, 网页, 抓取, 爬取, google, 搜一下, 查资料]

