# watcher 唯一真值：已装外部 skill/plugin 的上游锚（daily_governance.check_upstream_drift 消费）。
# 纯数据，不放 verdict/score（vetting 真值在 vetting-registry.yaml；采纳审计在 evolution/adoption-log.jsonl）。
#
# 维护义务：
# - FUSION refresh 落地后必须更新对应行 watch_sha/pinned_sha/pinned_at（FUSION-RUNBOOK 步⑨）。
# - 裁决「看过、不采纳」→ 把上游当前 SHA 填 ack_sha：静音该版本，上游再动才重新告警。
# - plugin 补审后同步 last_vetted_version（双写点：vetting-registry 散文 + 此处机读；watcher 本身会盯出不同步）。
# - repo 改名须手动更新（GitHub API 自动重定向可续跑，旧名被回收才失真）。
#
# 字段语义：
# - watch_sha  比较键 = touching path 的最后一次 commit（与 watcher 同款查询取得：
#              gh api "repos/O/R/commits?per_page=1&path=P" --jq ".[0].sha"；path 空 = 整仓）。
#              不用 repo HEAD：6/8 单元来自天天动的 monorepo，repo 级比较 = 永久假漂移。
# - pinned_sha vetting/refresh 锚（FUSION diff 基线），不参与漂移比较。
# - ack_sha    已裁决「不采纳」的静音版本，null = 无。
# - source     adoption-log = 装机时钉过版本；backfill = 2026-07-15 回填（基线为回填日上游状态，
#              非装机版本——装机早于回填的单元本地内容可能落后于基线，refresh 时以 FUSION 实 diff 为准）。
