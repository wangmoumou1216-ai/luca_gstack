version: 1
principle: "Skill-first, Graph-optional"

skills:
  auto:
    modes:
      standalone:
        required: ["natural_language_requirement"]
        optional: ["scene", "existing_artifacts"]
      workflow:
        required: []
        optional: ["topic", "scene"]
    quality_gates: ["skill_pipeline_complete", "artifacts_produced"]

  magicpath:
    modes:
      standalone:
        required: ["ui_requirement"]
        optional: ["design_brief_artifact", "brand_tokens"]
      workflow:
        required: ["design_brief_artifact"]
        optional: ["ux_brainstorm_artifact"]
    quality_gates: ["design_generation_packet", "tool_consumption_contract", "component_mapping", "state_coverage", "no_packet_fact_drift", "component_rendered", "react_canvas_valid"]

  open-design:
    modes:
      standalone:
        required: ["design_source_artifact"]   # chain: design-brief 交互文档 | adhoc: 单点指定的方案 md
        optional: ["od_skill", "od_design_system", "brand_tokens"]
      workflow:
        required: ["design_brief_artifact"]
        optional: ["ux_brainstorm_artifact"]
    quality_gates: ["input_source_resolved", "design_generation_packet_when_chain", "instruction_compiled", "fxui_brand_text_tokens_only", "platform_designsystem_user_selected", "designsystem_bound_verified", "od_daemon_reachable", "artifact_generated", "prototype_spec_written", "no_source_fact_drift"]   # artifact_generated = desktop_generated_then_recovered(默认) OR headless_generated(opt-in)，产物落盘即 PASS
    notes: "design_output 主力，**默认桌面端生成（headless opt-in）**：luca 编译指令 → 评估并让用户选 Target platform + Design system → 建项目绑 designSystemId(建后验证) + 写 brief.md → **默认交用户在 OD 桌面端按生成(订阅会话, 可靠) → '拉回来' recover 落盘**；headless 经 daemon /api/chat(带 agentId) 为 opt-in，本 session 实测不稳(生成慢/daemon重启)，失败上限 1 后降级桌面端。人工判断后置(符合/迭代/停)。FxUI 只叠品牌色 #FF8000 + 文字色 #181C25/#91959E，其余走所选 design system 不覆盖。两种进入 chain/adhoc。"

  idea:
    modes:
      standalone:
        required: ["user_raw_idea"]
        optional: ["screenshots", "notes"]
      workflow:
        required: []
        optional: ["current_topic", "scene"]
    quality_gates: ["structured_need_list", "scene_capture"]

  deepresearch:
    modes:
      standalone:
        required: ["research_topic"]
        optional: ["scope_constraints"]
      workflow:
        required: []
        optional: ["idea_artifact", "prd_artifact"]
    quality_gates: ["source_traceability", "search_log", "consensus_matrix"]

  quick-research:
    modes:
      standalone:
        required: ["research_question"]
        optional: ["scope_constraints"]
    quality_gates: ["primary_source_only", "per_claim_attribution"]

  brainstorm:
    modes:
      standalone:
        required: ["idea_or_problem_statement"]
        optional: ["deepresearch_report", "idea_artifact"]
      workflow:
        required: []
        optional: ["deepresearch_report", "idea_artifact"]
    quality_gates: ["socratic_questions", "oracle_review", "stable_ids", "research_claim_coverage", "prd_destination_matrix", "no_unmapped_high_confidence_claims", "handoff_gate"]

  superpowers-brainstorming:
    source: "superpowers plugin"
    invoke: "Skill tool → superpowers:brainstorming"
    modes:
      standalone:
        required: ["idea_or_problem_statement"]
        optional: ["idea_artifact", "deepresearch_report"]
      workflow:
        required: []
        optional: ["idea_artifact"]
    quality_gates: ["design_doc_written", "user_approved_design"]
    notes: "/brainstorm 的轻量替代。不含 subagent、Oracle、AI Native 评估。适用场景 A/B。"

  ux-research:
    modes:
      standalone:
        required: ["design_question"]
        optional: ["prd_artifact", "screenshots"]
      workflow:
        required: []
        optional: ["prd_artifact", "brainstorm_output"]
    quality_gates: ["human_research_plan_gate", "source_traceability", "consensus_matrix", "research_only"]

  ux-brainstorm:
    modes:
      standalone:
        required: ["design_problem_or_idea"]
        optional: ["ux_research_report", "screenshots", "architecture_brief"]
      workflow:
        required: []
        optional: ["ux_research_report", "prd_artifact"]
    quality_gates: ["seven_ux_questions", "oracle_review", "stable_design_ids", "interaction_architecture"]

  design-brief:
    modes:
      standalone:
        required: ["design_input"]
        optional: ["prd_artifact", "ux_research_report", "ux_audit_report", "ux_brainstorm_artifact", "pasted_solution", "architecture_brief"]
      workflow:
        required: ["prd_artifact"]
        optional: ["ux_research_report", "ux_audit_report", "ux_brainstorm_artifact"]
    modes_detail:
      traceable_delivery:
        required: ["prd_artifact"]
        note: "Required when output will feed html-prototype, tech-spec, task-plan, or development."
      standalone_light:
        required: ["design_input"]
        note: "May omit PRD, but must not claim end-to-end traceable delivery."
    quality_gates: ["design_coordinate_system", "ai_native_layers", "eight_field_decision_cards", "state_coverage", "component_mapping", "prototype_carrier_confirmation", "traceability_gate", "design_generation_packet", "tool_consumption_contract", "single_entry_contract"]

  html-prototype:
    modes:
      standalone:
        required: ["prototype_brief"]
        optional: ["design_brief", "ux_audit_report", "screenshots", "figma_demo_blueprint"]
      workflow:
        required: []
        optional: ["design_brief", "ux_audit_report", "prd_artifact"]
    source_kinds: ["design_brief", "ux_audit", "screenshot_delta", "figma_demo_blueprint", "standalone_brief", "standalone_mobile_prototype"]
    quality_gates: ["step0_cognitive_gate", "framework_contract", "design_system_contract", "design_generation_packet_gate", "prototype_carrier_respected", "decision_mapping_coverage", "state_mapping_coverage", "dynamic_reference_when_triggered", "prototype_qa"]

  figma-demo:
    modes:
      standalone:
        required: ["spoken_or_written_flow"]
        optional: ["figma_link", "figma_screenshot"]
      workflow:
        required: []
        optional: ["design_brief", "prototype_context"]
    quality_gates: ["mapping_verification", "blueprint_schema", "builder_isolation", "assembly_no_new_design"]

  figma-layer:
    modes:
      standalone:
        required: ["index_html", "prototype_spec"]
        optional: ["blueprint_yaml", "design_brief"]
      workflow:
        required: []
        optional: ["html_prototype_output", "figma_demo_output", "open_design_output"]
    source_kinds: ["html-prototype", "figma-demo", "open-design"]
    quality_gates: ["read_actual_html", "figma_mcp_required", "source_specific_component_inventory"]

  tech-spec:
    modes:
      standalone:
        required: ["design_brief_handoff", "prd_artifact"]
        optional: ["ai_spec_artifact", "architecture_brief"]
      workflow:
        required: ["prd_artifact", "design_brief_handoff"]
        optional: ["prd_handoff"]
    quality_gates: ["conflict_register", "architecture_view", "interface_contracts", "traceability_matrix", "design_mapping_coverage", "coverage_gate"]
    output_path: "docs/engineering/YYYY-MM-DD-<topic>-tech-spec.md"
    handoff_path: "docs/handoff/YYYY-MM-DD-<topic>-tech-spec-handoff.md"

  task-plan:
    modes:
      standalone:
        required: ["tech_spec_handoff", "design_brief_handoff"]
        optional: []
      workflow:
        required: ["tech_spec_handoff", "design_brief_handoff"]
        optional: []
    quality_gates: ["l0_index", "l1_source_index", "l2_node_index", "assertion_matrix", "task_cards", "design_decision_coverage", "state_coverage", "coverage_gate"]
    output_path: "docs/engineering/YYYY-MM-DD-<topic>-task-plan.md"
    handoff_path: "docs/handoff/YYYY-MM-DD-<topic>-task-plan-handoff.md"

  code-hygiene:
    modes:
      standalone:
        required: ["scope_or_mode"]
        optional: ["target_paths"]
      workflow:
        required: []
        optional: ["target_paths"]
    quality_gates: ["verification_iron_law", "high_confidence_apply_only", "luca_guards_preserved", "clean_tree_for_apply"]
    notes: "工程域代码约束 skill（非设计）。Iron Law 完成前验证 + 8 清理算子。代码审查复用 quality-gate/redteam。"

  code-recon:
    modes:
      standalone:
        required: ["target_codebase_path"]
        optional: ["design_intent", "scope_paths"]
      workflow:
        required: []
        optional: ["design_intent", "scope_paths"]
    quality_gates: ["size_probe_decision", "parallel_recon", "verified_vs_inferred_audit", "architecture_brief_written", "native_first_no_forced_mcp"]
    notes: "Brownfield 正门（非设计 skill）：现有代码 → 架构 brief → 作 ux-brainstorm/design-brief/tech-spec 的 architecture_brief optional 输入。native-first；codegraph MCP 仅规模阈值命中≥2 时提示、装下游不进 gstack。只读 recon 不改代码。"

  muse-loop-orchestrate:
    modes:
      standalone:
        required: ["corpus_or_instruction"]
        optional: ["existing_req_id"]
      workflow:
        required: []
        optional: ["existing_req_id"]
    quality_gates: ["gate1_triage_confirmed", "gate2_design_map_confirmed", "traceable_delivery_required", "cold_start_judge_isolation"]
    notes: "muse 专属。独立正向单趟状态机（extract→triage→map→gen→judge），零接入母版 Orchestrator。"

  muse-req-triage:
    modes:
      standalone:
        required: ["candidate_requirements_or_raw_corpus"]
        optional: []
      workflow:
        required: ["candidate_requirements"]
        optional: []
    quality_gates: ["gate1_human_decision", "no_rice_fabrication", "brainstorm_phase15_firewall"]
    notes: "muse 专属。standalone 模式：本 skill 自己读原始语料+算信号，accept 项格式化为话题字符串送进 /brainstorm。workflow 模式：被 muse-loop-orchestrate dispatch，接收已抽取候选，输出走 docs/loop/specs/。"

  insight-synthesis:
    modes:
      standalone:
        required: ["primary_qualitative_data"]
        optional: ["research_question"]
      workflow:
        required: ["primary_qualitative_data"]
        optional: ["research_question"]
    quality_gates: ["observation_interpretation_split", "theme_confirmation_gate", "no_confidence_fabrication"]
    notes: "研究段第三对象角度（内部一手定性）。数据一律用户提供、skill 不自采。单 agent 六步：编码→亲和聚类→用户确认主题(AskUserQuestion 卡点)→解读跃迁；observation 带原文引用、interpretation 带置信度，两层永不混。"

governance_tools:
  compare:
    modes:
      standalone:
        required: ["comparison_targets"]
        optional: ["skill_name"]
      workflow:
        required: []
        optional: ["skill_name", "artifact_versions"]
    quality_gates: ["both_files_read", "structured_diff", "read_only"]
    notes: "方案/版本/截图对比。只读，不修改文件。输入为两个完整路径，或 skill 名称自动取最新两个版本。"

  ux-audit:
    modes:
      standalone:
        required: ["screenshot_or_page_reference"]
        optional: ["business_context"]
      workflow:
        required: []
        optional: ["prototype_output", "current_page_context"]
  redteam:
    modes:
      standalone:
        required: ["target_artifacts_or_problem"]
        optional: ["docs_context"]
      workflow:
        required: []
        optional: ["docs_artifacts", "observability_recent"]
  evals:
    modes:
      standalone:
        required: ["target_artifacts"]
        optional: ["workflow_state"]
      workflow:
        required: []
        optional: ["workflow_state", "observability_recent"]
  retro:
    modes:
      standalone:
        required: ["completed_decision_or_project"]
        optional: ["review_artifacts"]
      workflow:
        required: []
        optional: ["design_brief", "handoff_review", "ux_audit"]

  # muse fork 专属新增（muse-loop 内部阶段 skill）：不进 project_skills / 不设独立
  # command 文件 / 不进 skill-routing-map.yaml——只由 muse-loop-orchestrate 内部
  # dispatch。按本仓 redteam/evals/retro 的 Tier-A 隐藏先例，仅在此登记
  # governance_tools 契约，保持可治理可见性。muse-req-triage 已提升为
  # project_skills（见上方），不再在此重复登记。
  muse_proto_gen:
    modes:
      workflow:
        required: ["design_map_output"]
        optional: ["prior_judge_gap_feedback"]
    quality_gates: ["controlled_vocabulary_only", "decision_id_traceable", "verify_prototype_qa"]

  # muse-proto-judge 已转为 .claude/agents/muse-proto-judge.md（同 quality-gate 的
  # agent 定义模式：Task 工具冷启动调度，非 Skill 工具+command 文件路径）。
  # agents/ 目录下的定义不在 input-modes.yaml 治理范围内（quality-gate 本身也
  # 不在此文件登记），故本条目已移除，不在此重复。
