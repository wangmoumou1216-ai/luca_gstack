name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  validate-yaml:
    name: Validate YAML Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Lint YAML files
        # .claude/workflow-state.yaml is a local-only gitignored symlink (absent on
        # clean runners) — lint only committed framework yaml, never the symlink.
        run: |
          yamllint -d relaxed .claude/skill-os/optional-workflow-graph.yaml
          yamllint -d relaxed .claude/skill-os/input-modes.yaml

  validate-markdown:
    name: Validate Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install markdownlint
        run: npm install -g markdownlint-cli
      - name: Lint docs
        run: markdownlint README.md CHANGELOG.md CONTRIBUTING.md SECURITY.md --ignore node_modules

  validate-skills:
    name: Validate Skill Definitions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all skills have SKILL.md
        run: bash scripts/validate-skills.sh

  validate-framework-logic:
    name: Validate Framework Logic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install Python deps (PyYAML)
        # 语义记忆以 promoted-facts.yaml 为真值源；check_memory_health /
        # propose_semantic / review_candidates 需 PyYAML 解析。setup-python 的
        # 全新解释器不含 pyyaml（仅系统 python 自带），故显式安装。
        run: pip install pyyaml
      # CI-safe subset only: these checks read committed repo files or run in
      # tmpdir fixtures / route-guard dry-run, and degrade gracefully when the
      # local-only docs/ and .claude/workflow-state.yaml symlinks are DANGLING
      # on a clean runner. check:project-links and the full verify.sh (S16
      # symlink check) are intentionally excluded — they validate those
      # local-only symlink targets and cannot pass on a clean checkout.
      # No `npm install` step: all wired scripts use only Node builtins /
      # Python stdlib (package.json has no runtime deps). Adding a third-party
      # import to any of them will require an install step here.
      - name: Hook runtime side-effect tests
        run: npm run check:hooks
      - name: Route-guard golden tests
        run: npm run test:routes
      - name: Routing-map coverage + skill SSOT consistency
        run: npm run check:routing-map
      - name: Project routing dry-run
        run: npm run check:project-routing
      - name: Coding discipline contracts
        run: npm run check:coding-discipline
      - name: Quality gate contracts
        run: npm run check:quality-gates
      - name: Memory system tests
        run: npm run test:memory
      - name: Memory stable-facts health
        run: npm run check:memory-health

  validate-html:
    name: Validate HTML Prototypes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check framework HTML files exist
        run: |
          for f in framework/list-page.html framework/detail-page-2col.html \
                   framework/detail-page-3col.html framework/form-page.html \
                   framework/home-page.html; do
            [ -f "$f" ] || (echo "MISSING: $f" && exit 1)
          done
          echo "All framework HTML files present ✓"
      - name: Validate HTML syntax
        run: |
          npm install -g html-validate
          for f in framework/*.html; do
            html-validate "$f" && echo "✓ $f" || echo "⚠ $f (warning only)"
          done
          # docs/prototype 中的原型（如有）也做检查
          if ls docs/prototype/*.html 2>/dev/null | head -1 | grep -q .; then
            for f in docs/prototype/*.html; do
              html-validate "$f" && echo "✓ $f" || echo "⚠ $f (warning only)"
            done
          fi
