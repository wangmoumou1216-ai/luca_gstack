opponent_summary: >
  写作三部曲的 exploit 阶段之一（in-progress，disable-model-invocation: true）。输入是一份 raw material
  markdown；跑一个 beat-by-beat、choose-your-own-adventure 式旅程：先与用户settle prerequisites（读者
  进门已知的 grounded 概念），再写 2-3 个候选起始 beat（各只能倚靠已 grounded 概念、标注各自 ground
  什么新概念），用户挑一个后只把那一个 beat 写入文章文件、停；每轮从磁盘重读文章、再给 2-3 个可达的
  next beat，循环到自然结束。核心是 grounding 机制（概念须先 grounded 才能被 beat 倚靠，形成概念 DAG）
  与 beat 的定义（一次一个动作，一句到多段按需）。单个 SKILL.md，无 support_files。
our_summary: >
  我方无对应 skill（our_counterpart: none）。框架内无 beat/grounding 写作方法论（grep 0 命中），
  设计管线（brainstorm/design-brief/tech-spec…）不含 prose 写作的逐 beat 塑形层。此 skill 属作者写作
  方法论，非 luca_gstack 的产品设计/工程管线核心。
mechanisms:
