      scope: '.claude/skills .claude/skill-os scripts CLAUDE.md .claude/agents'
      hits: 0
    delta: >
      对方把写作建模成概念 DAG——一个 beat 只能倚靠已 grounded 概念，选一个 ground 了 X 的 beat 会解锁
      所有等待 X 的 beat。这与 personal/edit-article 的"信息 DAG 依赖排序"同源、更细化。我方无 grounding
      机制（0 命中），无 prose 依赖排序写作层。
  - name: beat-by-beat-choose-your-own-adventure
    summary: 逐 beat 增量写，每轮给 2-3 候选方向让用户选，写一个就停、重读磁盘再续，旅程完则止（非池空则止）。
