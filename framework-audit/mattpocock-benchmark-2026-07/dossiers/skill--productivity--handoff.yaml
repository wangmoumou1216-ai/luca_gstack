  (2) grep suggested skills/推荐路径 命中 CLAUDE.md 247 行"用于推荐路径、handoff gate、…下游建议"——
  证实我方下游推荐在 workflow 层而非文档内嵌。意外事实：prior verdict 把 handoff-review 当作 opponent 的
  冗余对位，但读全文后 handoff-review 是"交付审查质量门"而非"对话→交接文档写手"，二者职能不同（已在
  prior_verdict_response 逐条核对，未下新结论）。opponent 单元 support_files 为空，SKILL.md 已逐行读到
  argument-tailoring 末句。未打分、未落桶、未写采纳/拒绝建议。
