    summary: leading word（承载整篇的紧凑隐喻/造词）是最有价值的 fragment，命中后贯穿整个 exploit。
    opponent_evidence:
      - path: skills/in-progress/writing-fragments/SKILL.md
        quote: "Of these, the leading word is the most valuable fragment to land."
    absence_proof:
      pattern: 'leading word|leading-word'
      scope: '.claude/skills .claude/skill-os scripts CLAUDE.md .claude/agents'
      hits: 0
    delta: >
      对方把"造一个 leading word（命名整个 pattern 的紧凑隐喻）"当 explore 阶段最高价值动作——它 load-
      bearing 地塑造后续结构/过渡/标题。我方框架无 leading-word 概念（0 命中）；这是本 skill 归 M3 的
      核心可迁移洞见（matrix 已标 leading-word 洞见归 M3），但作为独立写作 skill 无转移面。
  - name: heterogeneous-fragments-explore-append
    summary: explore 只沉淀异质 fragment 到单文件、不定结构，静默追加、每写前重读磁盘保留用户编辑。
    opponent_evidence:
