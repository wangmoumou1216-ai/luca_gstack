        quote: "Fragments are deliberately heterogeneous."
    absence_proof:
      pattern: 'deliberately heterogeneous'
      scope: '.claude/skills .claude/skill-os scripts CLAUDE.md .claude/agents'
      hits: 0
    delta: >
      对方 explore/exploit 分离——explore 只准发散冒 fragment、committing 是 exploit 别的 skill 的活。
      我方 brainstorm 拷问直接收敛到结构化 PRD，无"纯发散、异质碎片、不定结构"的独立 explore 阶段
      （0 命中）。
