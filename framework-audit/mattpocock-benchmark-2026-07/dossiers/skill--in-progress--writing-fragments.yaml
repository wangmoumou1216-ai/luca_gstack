opponent_summary: >
  写作三部曲的 explore 阶段（in-progress，disable-model-invocation: true）。纯 explore：不定结构，跑一个
  grilling session 不停拷问用户想写什么，把两侧对话冒出的 fragment 追加进单个 markdown 文件（H1 工作
  标题 + 用 `\n---\n` 分隔、无内部标题无 tag 无顺序）。fragment 定义刻意异质（一句金句/一个带一行论据
  的断言/一个 vignette/半个想法/一句引语/一串靠感觉聚拢的观察/一个 leading word）。核心洞见：leading
  word（一个能承载整篇的紧凑隐喻或造词，如 tracer bullets / fog of war）是最有价值的 fragment，load-
  bearing，在 explore 命中会贯穿整个 exploit。静默追加、每写前重读磁盘保留用户编辑。无 support_files。
our_summary: >
  我方无对应 skill（our_counterpart: none）。框架内无 fragment/leading-word 写作探索机制（grep 0 命中）。
  我方 brainstorm 是苏格拉底式 PRD 拷问、产出结构化需求，不是"不定结构、异质 fragment 沉淀"的写作
  explore；无"造一个 leading word 承载整篇"的显式动作。
mechanisms:
