  `grep -riE '\bseams?\b|test seam|highest seam|existing seam' .claude/skills/office/tech-spec
  .claude/skills/office/brainstorm` → 0 hits (the only prior "seam" match repo-wide was "seamless"
  inside brainstorm/references/pressure-test.md, a false positive); and
  `grep -rilE 'issue tracker|ready-for-agent' .claude/skills .claude/skill-os CLAUDE.md` → 0 hits.
  Expanded past the 2 subverdict hints to 4 mechanisms after reading full text: the fixed
  spec-template and the tracker-publish are distinct mechanisms beyond the no-interview and
  seam hints. Noticed but did not split out: to-spec's prototype-snippet exception in
