  grep -rilE "zone of proximal|storage strength|fluency strength|desirable difficulty|interleav|spaced repetition|pedagog|curriculum|lesson plan|learning record" .claude/skills .claude/skill-os CLAUDE.md;
  grep -rilE "teach the user|teaching workspace|teach a (new )?(skill|concept)" ... (0);
  grep -rlE "_Avoid_" ... (0);
  grep -rilE "delegate to a .*communit|high-reputation communit|acquiring wisdom" ... (0).
  Partial structural analog found only for learning-records-and-zpd: our .luca/memory/decisions.md ledger
  and three-layer Hermes-style memory are ADR-like and cross-session but agent/project-facing, not
  user-learning-facing — cited as our_evidence with the facing difference recorded in delta. No harness
