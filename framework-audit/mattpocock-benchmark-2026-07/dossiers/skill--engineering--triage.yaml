id: skill:engineering/triage
kind: skill
tier: A
opponent_sha256: d45827c299c021f77b0f146fefa3ee679b13f99e9a2ffdf48e8de2347adeefe1
opponent_summary: >
  对方 triage 是一个针对 GitHub issue tracker（含外部 PR，"a PR is an issue with attached
  code"）的状态机 skill：2 个 category 角色（bug/enhancement）+ 5 个 state 角色
  （needs-triage/needs-info/ready-for-agent/ready-for-human/wontfix），带 state transition
  规则，直接改 issue 上的 label。核心流程 6 步：gather context（含 redundancy 检索 +
  .out-of-scope 前案检索）→ recommend → verify the claim（复现 bug / 检出 PR 跑测试）→ grill
  if needed（调 /grilling + /domain-modeling）→ apply outcome。两个 support 文件：AGENT-BRIEF.md
  规定 ready-for-agent 时写的"durable、behavioral、path-free"agent 契约；OUT-OF-SCOPE.md 规定
  被拒 enhancement 落 `.out-of-scope/` 持久知识库用于机构记忆 + 去重。所有 triage 期间发帖必须以
  `> *This was generated by AI during triage.*` 免责声明开头。
our_summary: >
  我方对位是 muse fork 专属的 muse-req-triage：批量候选需求的 triage 关卡（非最终裁决者），机器只做
  可回溯性检查 + rule-based proxy 打分 + 提议分类，最终 accept/defer/reject 留给人类。Phase 1 用
  队列能提供的真实信号（repetition_count/emphasis_level/requester_role/explicitly_flagged）打分，
  刻意不套 RICE；Phase 2 用专属 5 值枚举（TRIAGE_ACCEPT/DEFER/REJECT/DUPLICATE/ESCALATE）；Phase 3
  用 AskUserQuestion 呈现信号 + 建议分类 + EARS 机械校验 + design_reference 状态并等人拍板；Phase 4
  按入口出产物——入口 A（独立）出喂给 /brainstorm 的话题字符串，入口 B（被 muse-loop-orchestrate
  dispatch）出 schema.md 的 L1 需求卡 requirement.md。对象是待筛需求语料，不接 issue tracker，不改
  label，无状态机迁移。
mechanisms:
  - name: triage-classification-taxonomy
    summary: 把待办项归入一套 triage 分类/角色体系，作为后续动作的驱动。
    opponent_evidence:
      - path: skills/engineering/triage/SKILL.md
        quote: "Every triaged issue should carry exactly one category role and one state role."
      - path: skills/engineering/triage/SKILL.md
        quote: "State transitions: an unlabeled issue normally goes to `needs-triage` first"
    our_evidence:
      - path: .claude/skills/office/muse-req-triage/SKILL.md
        quote: "这是本 skill 专属的窄分类，**不是** brainstorm 的 8 值 disposition 枚举"
      - path: .claude/skills/office/muse-req-triage/SKILL.md
        quote: "TRIAGE_ESCALATE   — 机器判断不了，直接甩给人类判断（如涉及价格/商业策略）"
    delta: >
      对方分类 = 2 个 category 角色 + 5 个 state 角色构成的状态机，带迁移规则，直接改动 live issue
      tracker（GitHub）上的 label，每个 issue 恰好一个 category + 一个 state。我方是 5 值分类枚举
      （ACCEPT/DEFER/REJECT/DUPLICATE/ESCALATE）叠加 rule-based proxy 打分，作用对象是候选需求语料，
      无状态迁移、无 live tracker、不改任何 label，产物是喂给 /brainstorm 的待裁清单而非驱动 issue
      标签变更。两者都是 triage 分类，但对方的类目直接编排 issue/PR 上的动作，我方的类目仅供人类拍板。
  - name: verify-before-grill
    summary: 在花力气 grill 澄清之前，先实证核验声称是否成立。
    opponent_evidence:
      - path: skills/engineering/triage/SKILL.md
        quote: "Before any grilling, check that the claim holds up."
      - path: skills/engineering/triage/SKILL.md
        quote: "For a bug, reproduce it from the reporter's steps. For a PR, confirm the diff does what it claims"
    our_evidence:
      - path: .claude/skills/office/muse-req-triage/SKILL.md
        quote: "机器只能做三件事：可回溯性检查、rule-based 打分、提议分类。"
      - path: .claude/skills/office/muse-req-triage/SKILL.md
        quote: "先对 `statement_ears` 做机械校验"
    delta: >
      对方在 grill 之前主动实证核验：bug 按 reporter 步骤复现、PR 检出后跑相关测试/命令，回报
      confirmed（附 code path）/failed/insufficient，核验通过再进 grill。我方只做机械 EARS 语法
      校验 + 可回溯性检查，并明确把机器限定在打分/提议分类、真伪由人类拍板；不复现 bug、不执行或
      测试任何声称。对方的核验是 grill 的前置门；我方全程没有复现/执行这一步。
  - name: redundancy-check
    summary: 检索现有实现，已实现的请求直接判为 already-implemented wontfix。
    opponent_evidence:
      - path: skills/engineering/triage/SKILL.md
        quote: "(a) **redundancy** — search for an existing implementation of the requested behavior by domain concept (not just the request's wording)"
      - path: skills/engineering/triage/SKILL.md
        quote: "If found, it's an already-implemented `wontfix`"
    our_evidence:
      - path: .claude/skills/office/muse-req-triage/SKILL.md
        quote: "TRIAGE_DUPLICATE  — 与已有 REQ/PRD 重复（引用重复对象）"
    delta: >
      对方按 domain concept（非请求措辞）在真实代码库里检索是否已有实现，找到则关为 already-implemented
      wontfix 并指向它所在位置。我方有 TRIAGE_DUPLICATE 类，但去重对象是已有 REQ/PRD 规格产物（spec
      层），不是已上线代码库；且只引用重复对象，不去源码里检索现有实现。
  - name: out-of-scope-dedup-kb
    summary: 被拒 enhancement 落持久知识库，供机构记忆与未来去重。
    opponent_evidence:
      - path: skills/engineering/triage/OUT-OF-SCOPE.md
        quote: "The `.out-of-scope/` directory in a repo stores persistent records of rejected feature requests."
      - path: skills/engineering/triage/OUT-OF-SCOPE.md
        quote: "when a new issue comes in that matches a prior rejection, the skill can surface the previous decision instead of re-litigating it"
    absence_proof:
      pattern: "\\.out-of-scope/"
      scope: ".claude/skills .claude/skill-os CLAUDE.md muse-loop"
      hits: 0
    delta: >
      对方维护一个持久 `.out-of-scope/` 知识库——每个被拒 concept 一个 markdown 文件，按 concept
      相似度（非关键词）匹配，只在 enhancement 被拒时写入（已实现的绝不写，以免污染去重），提供机构
      记忆并对未来请求去重、避免重新辩论。我方有 TRIAGE_REJECT 类但无被拒请求的持久存储：拒绝理由不
      落盘留存，重复提交的被拒请求不会被自动对照历史决策浮出。（grep `\.out-of-scope/` 于
      .claude/skills .claude/skill-os CLAUDE.md muse-loop 命中 0。）
  - name: agent-brief-drift-resistance
    summary: ready-for-agent 时写抗代码漂移的 durable、path-free、behavioral 契约。
    opponent_evidence:
      - path: skills/engineering/triage/AGENT-BRIEF.md
        quote: "Write the brief so it stays useful even as files are renamed, moved, or refactored."
      - path: skills/engineering/triage/AGENT-BRIEF.md
        quote: "**Don't** reference file paths — they go stale"
    our_evidence:
      - path: .claude/skills/office/muse-req-triage/SKILL.md
        quote: "遵循 `muse-loop/schema.md` v0.5 的完整 L1 需求卡格式"
      - path: .claude/skills/office/muse-req-triage/SKILL.md
        quote: "格式化为一个话题字符串，作为 `/brainstorm` Phase 0.1 的 cold-start 输入"
    delta: >
      对方的 agent brief 是一份抗代码漂移的契约：behavioral 而非 procedural、不引用文件路径/行号、描述
      interfaces/types/acceptance-criteria，使其在 issue 等待期间历经 rename/refactor 仍有效。我方产物
      是入口 B 的 L1 需求卡（schema.md）或入口 A 的一句话话题字符串——忠实抽取需求陈述 + 信号，但无任何
      drift-resistance 纪律（无 path-free 规则、无 behavioral-over-procedural 原则、无 acceptance-criteria
      契约），因为它喂的是上游 design/PRD 步骤而非 AFK 实现 agent。

notes: >
  跑过的 grep：`grep -rin "\.out-of-scope/" .claude/skills .claude/skill-os CLAUDE.md muse-loop`
  命中 0（另 `grep -ril "out-of-scope"` 的 2 处命中经核验均无关——design-brief 模板占位符
  `{out-of-scope item}` 与英文短语，非持久 KB 机制）。意外事实：muse-req-triage SKILL.md 引用的
  `constitution.md`（真伪判据/优先级信号权威源）在仓库中不存在（find 全仓 0 命中），是一处 dangling
  reference；其 schema.md/req-extraction-principles.md 实际位于仓库根 `muse-loop/` 而非 skill 目录内。
  harness 内建 counterpart：对方 verify-before-grill 的执行核验，在我方生态里对应 Claude Code 原生
  verify skill（仓库无文件，harness 内建），但 muse-req-triage 自身不调用它、仅做 EARS 静态校验，故
  仍按 our_evidence 记我方现状。opponent_sha256 逐字复制自 inventory.yaml。check-coverage.py --dossier
  自验通过（见 verify_pass）。
