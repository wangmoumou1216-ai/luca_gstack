id: skill:productivity/grill-me
kind: skill
tier: A
opponent_sha256: 6189dfceb7304a6e5558f75d87e68fa3bc7fcf7ba120e44f21f8a61fe01eba54
opponent_summary: >
  grill-me is a user-invoked (disable-model-invocation:true) thin shell whose entire body is a single
  directive — "Run a `/grilling` session." It carries a curated one-line description ("A relentless
  interview to sharpen a plan or design.") but delegates all substance to the sibling `grilling`
  primitive. grilling is the model-invoked skill that holds the actual protocol: interview the user
  relentlessly one question at a time, walk each branch of the design tree resolving dependencies,
  look up facts in the codebase but leave decisions to the user, and do not enact the plan until a
  shared understanding is confirmed. So grill-me is only a manual slash entry point over grilling;
  the interrogation logic lives entirely in the primitive, not in the shell.
our_summary: >
  Our counterpart is brainstorm, a 724-line full multi-phase skill (not a thin shell). It runs
  one-question-at-a-time Socratic dialogue using 6 adapted YC-style forcing questions, classifies
  scope into Lightweight/Standard/Deep-feature/Deep-product, generates 2-3 approaches, and writes a
  PRD with stable R#/A#/F# IDs plus handoff and memory integration. The interrogation substance that
  grilling delegates to is folded directly into brainstorm ("I interrogate before I synthesize. I
  ask one question at a time."). We have no separate thin-shell wrapper that merely invokes
  brainstorm — the user-invocable /brainstorm entry and the substance are the same artifact.
