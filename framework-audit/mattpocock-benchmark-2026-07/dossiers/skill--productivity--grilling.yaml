  二者均为对 mattpocock grill 系 skill 的外部评估记录，非我方自有 primitive——佐证 reusable-primitive
  缺席。grep -rn "grilling" skills/ 于对方仓库证实 `/grilling` 被 grill-me/grill-with-docs/wayfinder/
  triage/improve-codebase-architecture/ask-matt/loop-me 等多 skill 调用；CHANGELOG 亦记载 grilling 被
