        （facts/decisions 分离）及其它单元无同机制跨单落地。
      - aspirational prose 当实绩：无。E=2（无 CHANGELOG），三条机制均只给 +1 base、无一条拿"咬过人"
        +1 bonus——D 打分在这条上是克制的。本次 D 虚高来自"形态差异当能力缺口"（argument-tailoring/
