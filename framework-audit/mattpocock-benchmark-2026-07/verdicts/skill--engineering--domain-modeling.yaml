score_derivation: |
  D=3（redteam 修正，原评 5——扣掉双重计分与无据 bite bonus 各 1 分；推导见 redteam 块）：
  - active-modeling-vs-passive：+1（原 +2）。主动纪律（当场质问冲突术语/发明边缘场景压测/代码
    交叉验证）我方无——CONTEXT.md 被动写入（/retro+复盘），唯一术语挑战是 brainstorm Oracle 的
    ephemeral drift 检测，不沉淀不跨会话。**bite bonus 撤销**：rubric 的 +1 需"CHANGELOG 记录/
    复现实例"证明该机制咬过人（对齐锚 A grilling），dossier 只挂 SKILL.md prose 两引；对方
    CHANGELOG 记的是 skill 创建+被 grill-with-docs/improve-codebase 依赖（adoption 证据），
    不是 challenge-terms 行为抓到真实冲突的复现 → 只给 base +1。
  - avoid-alias-convergence：+0（原 +1，**双重计分撤销**）。同一"opinionated canonical 收敛"
    能力已在 mech:avoid-alias-table 计 +3（avoid-alias-line+be-opinionated-convergence-rule）；
    审计自身反双计约定（mech:context-md-domain-glossary 对 active-vs-passive 记"+0 已计入
    skill verdict 不重复"）要求同一机制只在一处计分。本 verdict 自陈"落地归 mech:avoid-alias-
    table 单元" → 计分也应归零，只留交叉引用。
  - inline-not-batch-update：+1。术语定案即写 vs 我方 Stop 时批处理。注意非全冲突：
    extraction-bar 的批处理管的是**记忆提取**，术语表 inline 更新是另一对象——可并存。
  - adr-offer-three-part-test：+1。三条件合取提议门（难逆+费解+真权衡）我方 decisions.md
    一行台账无此门；dossier 另证实我方无任何 docs/adr 体系（find 0 命中）。
  I=7：CONTEXT.md session 启动注入(+2)/project.sh 项目 CONTEXT 机制(+2)/retro+skill 写入
  使用史(+2)/appendix 契约(+1)/无 checker(0)。
  C=M：CLAUDE.md「写入时机」段 + 项目 CONTEXT 骨架约定 + brainstorm Oracle 一行，≤4 文件。
  E=3：promoted(+1)+CHANGELOG（ubiquitous-language→domain-modeling 演进）(+1)+非 draft(+1)。

