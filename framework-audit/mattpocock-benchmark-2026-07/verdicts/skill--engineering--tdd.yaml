  code-hygiene 文档显式让位）。

reconciliation: |
  旧裁决：APPROVED-90（2026-06-07，vetting-registry:210-250）。**维持 APPROVED，无翻案**。
  但 P1 矩阵的"批而未装=执行债"假设被 dossier 实地核验**推翻一半**：
  ① 安装真实发生——~/.claude/skills/tdd symlink 批准当天（2026-06-07 17:14）即建，指向
    ~/.agents/skills/tdd，6 文件齐全。"未装"仅在"未接入 office 一级管线"这一窄义上成立
    （而这正是 integration_note 的原意，合规）。
  ② integration_note 说"不要加 routing-map"，但 skill-routing-map.yaml:260-264 存在 tdd
    词条（触发词：tdd/测试驱动/写测试/测试先行/红绿重构/单元测试）——比处方更集成一步。
    该词条实际达成 FM-11 可达性，未见负面效应；记录漂移，建议保留词条并在 registry 该条目
    追加一行备注更正 integration_note（append-only）。
  ③ 真正的执行债是**stale install**：安装版冻结在 2026-06-07，上游已删 3 文件
    （deep-modules/interface-design/refactoring→委托 code-review）并新增 seam 确认门 +
    tautological 反模式两个高价值机制。刷新即可收割，成本 S。

