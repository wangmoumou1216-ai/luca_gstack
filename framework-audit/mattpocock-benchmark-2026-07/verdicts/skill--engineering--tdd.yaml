  verdict: downgraded
  steelman_incumbent: |
    最强"现任够用/刷新只是加噪音"论：已安装的 2026-06-07 旧版 tdd 已携 TDD 全部核心——
    interface-is-test-surface、红绿循环、mock 边界三机制都在（grep 安装版实证）。这次刷新净
    增只有 2 个边角机制：seam 确认（写测试前多一道人类卡点仪式）+ tautological 一条反模式警示；
    与此同时刷新**删掉** deep-modules.md + interface-design.md 两份设计内容。故可论：现任（安装旧版）
    已够，刷新是"多一个仪式+一条警示、换掉两份设计文档"的近乎等价交换，framework 层面几乎无净得。
    为何**不致命**：① seam 与 tautological 经双侧引文核实在仓内 AND 安装旧版**双双缺席**（非重复计分），
    tautological 直击 agent 写自证测试这一高频真实失败，价值非噪音；② 框架对这个外置 skill 有**活的
    接线依赖**——skill-routing-map.yaml:260-264 有 weight-7 tdd 词条（route-guard 会 surface）、
    code-hygiene 正文显式把"测试先行"让位给"全局 tdd"，即框架架构主动依赖它；以成本 S 刷新一个活依赖
    去收 2 个真实机制是正当维护。→ 把桶砍到"不动"会白丢便宜的真实价值，属"为杀而杀"。故**桶存**，
    但 verdict 对净增量的量化被夸大，须收窄。
  attack_notes: |
    裁决=downgraded：桶 adopt 存，收窄三处（只删不加）。
    ① D 3→2（承重下修）：第 3 个 D 点"上游结构演进/文件集 6→3 +1"应删——
       (a) 违 rubric §2 证据铁律：它不是 dossier 5 个双侧引文机制单元之一，"计分维度得分而无双侧
           引文=verdict 无效"；(b) verdict 自己写"形态漂移"，D 量的是**能力缺口**不是形态差；
       (c) 方向反了——刷新实为内容**减量**：会删 deep-modules.md(1239B)+interface-design.md(653B)，
           二者经实地核验在安装版存在、当前上游已无，是真实非冗余内容，把删除算成增量不成立。
       净增量只剩 seam + tautological = 2。（注：若改用"仓内为基线"框架 D 反而更高，但 verdict 选
       "安装旧版为现任"是保守取向，此下修只打第 3 点的方向性错误，不翻这个基线选择。）
    ② fit（无宪法冲突，但 merge_scope 掩盖了删除）：seam 确认是人类卡点，与"人类卡点承重"一致不冲突；
       框架按 code-hygiene 委托刻意把 TDD 外置，故 reuse_mode=install 整取是对的落法，非违最小文件/
       输入面收窄。**但** bucket_rationale 原写"对齐新文件集"把一次内容删除粉饰成中性对齐——已收窄为
       "只为 seam+tautological"，并加 refresh_caveat 要求删除前用户闸门取舍。
    ③ 集成成本核实：touched_files 诚实（仓外全局 + 1 行台账）；**未触** skill-invariants P1-P7
       保护区（全局安装非仓内 SKILL.md；routing 词条已存非新增；台账 append-only）。ab_runs=0
       **正确**——install 整取、仓内零 skill prose 吸收，不触机制层 prose A/B，非 BLOCK 红线情形
       （这条给 verdict 记功，不是攻击点）。dual_repo=false 对全局安装成立，但订正：vetting-registry.yaml
       经核**双仓皆在**（/Users/luca/Desktop/luca_gstack 与 fork 均验在），那一行台账备注须按 fork-local
