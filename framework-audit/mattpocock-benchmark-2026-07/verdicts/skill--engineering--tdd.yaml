  - 其余机制（interface-is-test-surface/红绿循环/mock 边界）：+0——安装版已含，非净增量。
  I=6：全局安装存在(+2)/routing-map tdd 词条存在（route-guard 可 surface，FM-11 达成）(+2)/
  code-hygiene 显式边界声明（"测试先行交还全局 tdd"）(+2)/但安装版冻结 stale(0)/无更新机制(0)。
  C=S：刷新全局安装（npx skills update 或重链），0 个仓内文件。
  E=3：promoted(+1)+CHANGELOG 活跃演进(+1)+非 draft(+1)。

