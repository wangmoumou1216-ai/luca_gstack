score_derivation: |
  D=5：
  - two-axis-parallel-antibias：+2。Standards 轴与 Spec 轴同消息并发两个隔离子 agent、
    互不污染判断——我方有"独立上下文审查"（quality-gate）与"派其一"择一分派（code-hygiene
    派 quality-gate 或 redteam），但无"同一 diff 上并发两条固定正交轴"的抗偏见结构
    （grep two-axis/两轴 0 命中）。
  - fowler-baseline-fallback：+2。具名 Fowler 12-smell baseline（仓库零文档也生效）+
    "仓库文档标准覆盖 baseline"显式优先关系——我方 8 清理算子仅 2 项部分重叠（dedupe/
    unused），缺 Feature Envy/Data Clumps/Primitive Obsession 等具名 smell 词汇
    （grep 具名 smell 0 命中），且算子目的是清理非审查。
  - refuse-cross-axis-ranking：+1。我方 quality-gate 有邻近纪律（逐维二元判定+废止整体
    主观分）但针对"不塌缩成单一分"，非"两轴保持分离不选跨轴赢家"——概念相邻折减计 1。
  I=7：code-hygiene routing(+2)/quality-gate+redteam 接线(+2)/P1-P7(+2)/使用史较新(+1)。
  C=M：code-hygiene SKILL.md 审查分派段 + quality-gate 调用模板，2-3 文件。
  E=3：promoted(+1)+CHANGELOG（review→code-review 更名 rationale）(+1)+非 draft(+1)。

bucket: merge
bucket_rationale: |
  rubric §3 补强合并：D=5 ≥ 3 ✓；机制 ≥2（双轴抗偏见、Fowler baseline）✓；全为加法。
  非替换：我方审查生态的承重轴（redteam 对抗式只提问、quality-gate 断言执行、luca 护栏
  保护有意模式）对方无对应 → 支配不成立。
  形态注意：落地为 code-hygiene 审查环节的 dispatch 模式增强（薄 prompt-pattern），
  不新造 reviewer engine——遵守 code-hygiene 自身"复用 quality-gate/redteam 不另造"
  与 Loop 宪法"优先接 harness 原生原语"（harness 已有原生 /code-review）。

merge_scope: |
  ① code-hygiene 审查环节增双轴分派选项：diff 审查存在 spec 上游（tech-spec/PRD）时，
    同消息并发两个审查 agent——Standards 轴（清理算子+具名 smell 词汇）与 Spec 轴
    （对照上游忠实性），产出分列呈现，禁 merge/rerank/跨轴选赢家。
  ② Standards 轴内容补 Fowler 具名 smell 清单（judgement-call 定位，仓库文档/luca 护栏
    显式覆盖 baseline——护栏优先关系保持现状不变）。

