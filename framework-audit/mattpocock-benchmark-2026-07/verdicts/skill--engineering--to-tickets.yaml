    只要标题具体、节点覆盖即过门禁）；穿层完整路径 + 单 context window 粒度（agent-native，
    非人时）确证缺席，+3 有实证支撑。即便激进折价（mech1 +2/mech3 +1 → D=5），D≥3 且 ≥2
    机制、全加法——merge 桶纹丝不动。
    (b) frontier 已被 plan-agent Wave 拓扑排序（plan-agent.md L300-304）覆盖大半——已验证该折减
    真实存在且 verdict 已诚实计入（+2 非 +3）；剩余 delta（逐卡阻塞清零即起，细于逐 Wave）真实但小，
    scope ③ 相应只取一行注记，罪罚相当。
    (c) 重复计分检查：全 verdicts grep——wayfinder 的 frontier 是 fog-of-war 探索边缘（不同机制）；
    implement verdict D=2 落 leave 且显式把重叠主题让渡（"seam 归 tdd/to-spec"），无一处双重计分。
    (d) E=3 的 "promoted(+1)" 标签不准确，但按 rubric 三轴逐项核验成立：CHANGELOG #464 有实质
    合并 rationale(+1)、.out-of-scope/mainstream-issue-trackers-only.md 有涉 to-tickets 拒绝
    理由(+1)、非 in-progress 非 deprecated(+1)——分数站得住，仅措辞欠精确。
    支配测试判定正确：覆盖率门禁/渐进式索引/断言矩阵对方全无 → 替换死于第 2 条，merge 是唯一
    合法落点。最强攻击打完，桶与 scope 均存活。
  attack_notes: |
    fit 与成本攻击的发现（均非致命，但 FUSION 执行时为硬约束）：
    ① scope 设计本身已最保守：③ 显式尊重 2026-07-02"零成本结构化/不建自动依赖图"决策，
    注记一行符合 Loop 宪法薄外环；对方最环境绑定的部分（tracker 发布/native blocking/
    ready-for-agent 标签）已被 scope 舍弃，未被 D 分走私进落地面。dual_repo: true 正确
    （已验证母版 ~/Desktop/luca_gstack 同路径存在 task-plan/SKILL.md，非 fork 专属）。
    ② 真实摩擦点（FUSION 必须显式处理，否则 scope ② 不可用或弱化门禁）：宽面机械重构
    （改列名/重打类型）常无对应 REQ/STATE/DEC 节点，而现卡模板强制"来源节点: 至少一个"
    （SKILL.md L202）且 Phase 7 按 MUST 逐项验卡。新卡型模板必须写明 expand/migrate/contract
    卡如何满足或豁免来源节点绑定——豁免须窄限定于 wide-refactor 卡型，不得触碰 Phase 7 门禁
    逻辑本身（P6 Phase 顺序与 P2 输出路径均未触碰，已核 skill-invariants，无 HIGH-INTEGRATION-RISK）。
    ③ ab_runs_needed=1 偏乐观：scope ② 是例外通道，常规 feature 输入的 A/B 永远不会触发它。
    诚实口径是 2 轮（一轮常规输入验非回归 + 一轮 wide-refactor 场景专门打通新卡型过 Phase 7）。
    非红线违反（A/B 存在，非零），故不动桶，但 FUSION 步⑥ 应按 2 轮执行。
