score_derivation: |
  D=5（锚 A 预注册 8，dossier 复核后下调，桶不变——见 anchor_recalibration）：
  - reusable-primitive：+3。我方有逼问"行为"（内嵌 brainstorm Phase 3）但无"抽取-复用"架构形态；
    muse-loop 需要逼问时 dispatch 整个 brainstorm Phase 0-5（dossier mechanisms[4] 双侧引文）。
  - facts-vs-decisions-split：+1（非 +3/4）。dossier 证实我方已有同一区分（"only the user can
    answer those"），差异仅是显式度/位置（对方一条居中规则 vs 我方散在 Phase 2/2.5），非有无。
  - one-question-at-a-time：+0。我方不弱于对方（CRITICAL RULE #3 + AskUserQuestion 绑定）。
  - confirmation-gate：+0。我方双门（永不实现 HARD GATE + gated handoff）覆盖同一意图。
  - 咬过人证据：+1。CHANGELOG #464 记载 confirmation gate 与 facts/decisions split 是后补的
    （实际踩过 agent 自问自答/抢跑才加），E 类实证。
  I=8：routing-map invoke 行(+2) / P3 preamble+observability 接线(+2) / P1-P7 约束(+2) /
  重度使用史(+2) / 无 brainstorm 专属行为回归测试(0)。
  C=M：触 brainstorm/SKILL.md + 新建共享 primitive 参考文件 + muse-loop 指针，2-4 文件。
  E=3：promoted(+1) + CHANGELOG 演进记录(+1) + 非 draft(+1)。

anchor_recalibration: |
  锚 A 预注册 D=8 的依据（"我方未显式抽出 facts/decisions 分离"）被 dossier 双侧引文部分推翻：
  分离存在、只是分散。D 8→5。桶不变（merge），判据仍满足；按 rubric「锚被推翻回 GATE 重校准」
  条款评估：bucket 层未翻，属分数校准非结论翻转，于 GATE-2 显式呈报而非中断回 GATE-1。
  后续所有单元按此校准后的尺度打分（D≥7 保留给"机制簇整体缺席"）。

bucket: merge
bucket_rationale: |
  rubric §3 补强合并：D=5 ≥ 3 ✓；独立引证机制 ≥2（reusable-primitive、explicit-split-form）✓；
  融合方案不移除 brainstorm 任何既有行为（抽 primitive + 显式化规则均为加法）→ FUSION 步⑥
  A/B 非回归可背书。不满足替换五条（支配测试不成立：one-question/confirmation-gate 轴上
  brainstorm 更强），替换不适用——与锚 A 标尺含义一致：D 高但非 Pareto 支配 → 补强不替换。

merge_scope: |
  ① 把 facts-vs-decisions 分离从分散规则提为 brainstorm 逼问环的一条居中显式规则（一行）。
    ——红队后本单元**唯一承重、立即落地**项；落 brainstorm Phase 3/2.5 可进化措辞区。
  ②（红队砍→ deferred-conditional）抽逼问环为共享 primitive：**"独立轻量 skill"选项删除**
    （撞 fork 输入面收窄/使用即留任纪律），仅保留 references/grilling-loop.md 形态，且**只在
    FUSION preflight 证出 brainstorm 之外第二个真实消费者时才落地**；否则逼问保持内嵌 brainstorm，
    不抽取。muse-loop 非有效消费者：它整跑 /brainstorm 是为拿真实可追溯 PRD（traceable_delivery
    硬约束），瘦 primitive 对它零收益（详见 redteam）。

reconciliation: null   # 本单元无既有裁决（grill-me 的 REJECT 不覆盖 grilling primitive 本体）

