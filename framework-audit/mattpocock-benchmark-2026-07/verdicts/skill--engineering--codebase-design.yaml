  注意不与 FxUI/设计管线词汇混淆：它只在代码/工程语境被引用（词条不含设计类触发词）。
  落位 routing-map 既有「External engineering skills」段（line 253，与 tdd/systematic-debugging
  同段，遵该段"故意不收 design 词，避免劫持设计管线"约定）；落地前 grep 现有 routing-map 核验剩余
