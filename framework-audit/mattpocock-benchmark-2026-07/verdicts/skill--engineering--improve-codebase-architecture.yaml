bucket_rationale: |
  rubric §3 补强合并：D=4 ≥ 3 ✓；机制 ≥2（deletion-test、HTML 报告）✓；加法。
  非替换：code-recon 的 VERIFIED/INFERRED 诚实审计、ux-audit 的权重评审是现任独有轴。
  **依赖声明**：merge ①② 中 deletion-test 依赖 codebase-design（Tier B）verdict 获批采纳
  ——词汇 primitive 不进来，deletion-test 就是无根术语；GATE-2 联动裁决。

merge_scope: |
  ① code-recon 增可选「深化机会」透镜：recon 产出架构 brief 时，对疑似浅模块跑 deletion
    test 标注 deepening candidates（依赖 codebase-design 词汇采纳）。
  ② HTML 可视化输出——【红队 downgraded 砍除】form difference（HTML vs md）+ 框架已有
