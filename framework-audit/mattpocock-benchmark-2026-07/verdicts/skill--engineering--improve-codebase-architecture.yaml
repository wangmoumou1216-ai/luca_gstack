redteam:
  verdict: downgraded
  steelman_incumbent: |
    最强"够用/纯加噪音"论证：本单元宣称的三机制里，两个是形态差异冒充能力缺口、一个是
    跨机制重复计分，真正净新的只剩 deletion-test 一条。
    - html-report(+1)：双方都产架构评审报告（我方 md 入 docs/engineering/），差异只是
      HTML vs md + before/after 图 + 写 tmp。而"写 tmp 不落库"这条标志性特征恰恰与我方
      artifact-passing 架构（P2 glob 发现、docs/ 持久化）对撞，merge_scope 自己已把它剔除
      （"md 主产物不变"）；剩下的"顺带渲染成 HTML"框架早有能力（html-prototype 自包含
      HTML + luca-open.sh 预览）。这正是 rubric 攻击①点名的"把形态差异算成能力缺口"。
    - vocab-forcing(+1)：dossier 自认 ux-brainstorm 已有 banned-list 扫描重写、figma-demo
      已有术语映射——机制我方具备，新的只是"架构领域词"这层内容填充；且它根本不在
      merge_scope（bucket_rationale 只列 deletion-test+HTML），被计入 D=4 却不落地。
    - deletion-test(+2)：第二分 = "深浅模块整套框架"，而"deep/shallow"正是 vocab-forcing
      glossary 逐字枚举的词（dossier line 44 framing ↔ line 75 glossary）——同一词汇在两个
      机制重复计分。按证据铁律"每 1 分挂 1 组双侧引文"，deletion-test 只有 1 组引文（1 quote
      + absence_proof），应 +1 不是 +2。
    honest D ≈ deletion-test(1) + 至多 html-report/vocab-forcing 各名义 +1（均属形态/内容
    差异）≈ 2-3，远非 4——D=4 虚高。
    为何仍不致命（不 kill）：deletion-test 是一条真实缺席（grep 0 已验）、自足、极廉价的
    诊断启发式（"删了它是集中复杂度还是只挪走"），code-recon Phase-2 记 friction 时确无此
    透镜；其唯一依赖（codebase-design 词汇）在同批已 adopt（weighted 83）满足。merge 判据
    只要"净正即可"，deletion-test 单条即净正。整单元判 leave 会把一条真实改进连同洗澡水一起
    倒掉——证据不支持 kill。
  attack_notes: |
    裁决 = downgraded：桶保持 merge，但 scope 收缩——砍除 merge_scope ②（HTML 可视化输出），
    只留 ①（deletion-test 深化透镜）。D 应由 4 修正为 ~3（去掉 deletion-test 重复计分的第二分；
    此处只在 redteam 块记录修正，不改 P2.5 judge 的 scores 原始记录）。
    ② 砍除理由（攻击①②③汇总）：
    - fit(②)：形态差异非能力缺口；标志特征"写 tmp 不落库"与 artifact-passing 架构冲突、
      本已剔除；框架已有 HTML-gen；② 的收益（luca-open 预览页签）是 fork-only 却被标
      dual_repo 主体——收益面与落地面错配。为"阅读体验"给只读 recon 加 HTML 渲染路径
      （模板 + Mermaid before/after 生成）违最小文件原则/输入面收窄。
    - integration(②)：landing_estimate touched_files=1 只列 code-recon SKILL.md，但 ② 落地
      实需新增 HTML 报告模板/生成逻辑（≥1 文件）+ fork luca-open 推送行，原估算偏乐观；
      砍 ② 后 touched_files=1 反而变准确。
    ① 保留且核查通过（未触承重墙、依赖已满足）：
    - 承重墙：code-recon 输出 docs/engineering/<date>-<topic>-architecture-brief.md 不在 P2
      保护清单（P2 该目录只护 tech-spec/task-plan）；① 仅向 Phase-2/3 加 prose 透镜，不碰
      P1-P7。无 HIGH-INTEGRATION-RISK。
    - 依赖：① 依赖 codebase-design 词汇——该 verdict = adopt（weighted 83, install 全局），
      依赖在同批满足；但注意 deletion-test 在两 verdict 间做双重 justification（codebase-design
      fit=2 也把 deletion-test 列为采纳理由），GATE-2 联动裁决时勿对同一 primitive 二次加权。
    - ab_runs：① 是单条 additive 透镜 prose 吸收，A/B=1 足够验现任 recon 行为非回归；无
      "机制层 prose 吸收无 A/B" 的 BLOCK 风险。dual_repo(①)=true 正确（code-recon 两仓皆有、
      deletion-test 通用）。
    保留项净判：merge 成立于 deletion-test 单条净正；D 虚高与 ② 的形态噪音已剥离。
