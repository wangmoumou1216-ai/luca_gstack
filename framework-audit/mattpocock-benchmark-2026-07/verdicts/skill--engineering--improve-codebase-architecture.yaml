score_derivation: |
  D=4：
  - deletion-test：+2。具名启发式（删掉它会集中复杂度还是只挪走）+ 深浅模块整套框架 grep
    全仓 0 命中；code-hygiene 的死代码算子是不同透镜（删无用 vs 删了看复杂度走向）。
    **落地依赖 codebase-design（Tier B）的词汇采纳**——deletion test 引用 deep-module 词汇。
  - html-report-to-tmp：+1。可视化架构报告（before/after 图 + 推荐徽章，自包含 HTML）缺席；
    我方报告全是入库 markdown。**muse fork 协同点**：luca-open.sh 的 HTML 预览页签（热刷新）
    正好是这类报告的展示面。
  - vocab-forcing-never-say-list：+1。"正面术语表+负面替换禁列"的架构词汇强制缺席（我方
    banned-phrase 模式存在但作用域是语气/动效参数，非领域术语）。
  - living-domain-model-side-effects：+0（inline CONTEXT 捕获 + ADR 提议已在
    skill:engineering/domain-modeling verdict 的 merge scope 计入，不重复）。
  I=7：code-recon routing+新近使用(+3)/ux-audit 保护+使用(+4)。C=M。E=3。

