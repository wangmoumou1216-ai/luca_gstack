score_derivation: |
  D=2：
  - prose-flowmap（叙事条件路由）：+1。手写主流-匝道拓扑叙事地图我方无；但我方 CLAUDE.md
    语义兜底规则承担同类"叙事判断"职能，且 /office 向导承担用户侧咨询——形态缺席、职能覆盖。
  - skill-relationship-topology：+1。我方拓扑数据存在（optional-workflow-graph
    recommended_paths）但与路由器分居两个 artifact，无叙事化用户可读地图。
  - user-invoked-vs-automatic：+0（我方双路都有：route-guard 自动 + /office 用户invoked）。
  - context-hygiene-smart-zone：+0（我方等价纪律更自动化：20 轮起 hook 提醒 + Checkpoint 协议）。
  I=10：满分现任——route-guard 每消息运行(+2)/routing-map SSOT(+2)/check-routing-map.mjs +
  test-route-guard.mjs 双 checker(+2)/office 向导(+2)/FM-11 可达性验收制度(+2)。
  C=S / E=3。

bucket: leave
bucket_rationale: |
  rubric §3 不动：D=2 < 3。对方最有价值的配套约定——"skill 增删必须回头更新 ask-matt，否则
  就是会撒谎的路由器"——我方已有同构且更机器化的对应物（FM-11 可达性验收 + check-routing-map
  tripwire），无需引入。/office 向导若未来要增强"推荐路径叙事"，workflow-graph 数据已在，
  属既有能力的呈现优化，非本次采纳项。

