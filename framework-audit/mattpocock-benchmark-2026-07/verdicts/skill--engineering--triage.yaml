score_derivation: |
  D=6：
  - verify-before-grill：+2。对方在 grill 前实证核验声称（bug 复现/PR 检出跑测试，confirmed/
    failed/insufficient 三态）；我方 muse-req-triage 只做 EARS 机械校验+可回溯性检查，全程无
    复现/执行步（dossier 双侧引文）。这是"花人类注意力之前先验真"的前置门，我方真缺。
  - redundancy-check-by-domain-concept：+1。对方按领域概念（非措辞）检索**已实现代码**判
    already-implemented；我方 TRIAGE_DUPLICATE 只对 REQ/PRD 规格层去重，不查源码。
  - out-of-scope-dedup-kb：+1（能力缺席 grep 0 命中；**落地归 mech:out-of-scope-registry
    单元统一裁，此处不重复落地**）。
  - agent-brief-drift-resistance：+1。path-free/behavioral/acceptance-criteria 抗漂移契约
    纪律我方 L1 需求卡无；但我方卡喂上游设计而非 AFK 实现 agent，适用面折减。
  - triage-classification-taxonomy：+1。状态机+live tracker label 迁移形态我方无（我方 5 值
    枚举+人类拍板，对象是需求语料）；形态差异部分抵消。
  I=7：routing-map invoke(+2)/P1-P7+preamble(+2 内 P3 preamble 合并计)/fork 使用史(+1)/
  v2.1-v2.3 工具契约迭代但无自动化测试(+2 拆半计 P 约束+接线)。
  C=M：muse-req-triage/SKILL.md + muse-loop/schema.md 邻接，≤6 文件。
  E=3：promoted(+1)+CHANGELOG（qa 被 triage 吸收的演进记录）(+1)+非 draft(+1)。

bucket: merge
bucket_rationale: |
  rubric §3 补强合并：D=6 ≥ 3 ✓；独立机制 ≥2（verify-before-grill、domain-concept 冗余检索、
  drift-resistant brief）✓；全为加法，不动"机器只打分/分类、人类拍板"的宪法边界（verify 提供
  证据给人裁，不代裁）。非替换：muse-req-triage 的 rule-based proxy 打分（真实信号不套 RICE）、
  双入口（独立/被 loop dispatch）、5 值含 ESCALATE 是现任独有承重轴，对方无对应 → 支配不成立。

merge_scope: |
  ① muse-req-triage Phase 2 前增 verify-before-grill 前置门：候选需求若声称"现状已坏/已有实现"，
    先做可机验核查（grep 现有 REQ/PRD/实现锚点），核验结果作为信号呈给人类（不改变人类拍板边界；
    在 SKILL.md 角色声明中归入"可回溯性检查"，不新开机器权限类目）。
  ② TRIAGE_DUPLICATE 去重面从 REQ/PRD 扩到"已实现能力"。
    （红队删去原文"按领域概念检索 skill-os/skills 现状"——检索域错误：triage 对象是下游项目的
    产品需求，"已实现"参照物是当前激活项目的 shipped/prototype 现状，非框架 skill 清单；落地
    应接 schema.md L1 卡既有槽位 authenticity.entailment.compared_against=shipped_product_behavior，
    不另造机制。）
  （③ 已被红队砍掉：原"入口 B 的 L1 需求卡增 drift-resistance 一行（描述行为与验收判据，不引
  文件路径/行号）"——见 redteam.attack_notes。）
  （更正：dossier 曾报 constitution.md dangling reference，主线程复核为**假阴性**——文件
  存在于 fork 根 /constitution.md（4.7KB v1.0），loop-me dossier 的引文也经 grep 回验证实。
  无需伴生修复。）

