score_derivation: |
  D=6：
  - fog-of-war-frontier-destination：+3。机制簇整体缺席（grep 证实）：把未知显式建模为
    "刻意不完整的地图"——命名 destination 先定 scope、frontier 是当下可取的已知边缘、
    未锐化问题在 "Not yet specified" 雾里等毕业。我方 plan-agent 是一次性全量分解
    （Phase+Wave 静态图），无渐进揭示、无雾类持有区、无一等 destination 制品。
  - shared-map-on-tracker：+2。tracker 承载的跨 session 共享地图 + 按 assignment 认领票
    防并发冲突——我方跨 session 状态是本地 markdown（PROGRESS/checkpoint）单写者模式，
    并发控制是 session-project pin（不同关注点），无票级认领。
  - single-ticket-per-session：+1。每 session 最多解决一票 + 票按 ~100K token session
    定大小（absence_proof 0 命中）；与我方 Wave 内并行模型冲突，计缺席但适配性存疑。
  - plan-dont-do：+0（双方同有规划/执行硬边界）。
  - name-not-hash-reference：+0。与我方冻结稳定 ID 纪律**正面冲突**——我方 U-ID 永不重编
    是下游跨 session 引用的承重设计；对方人读性论点可取处仅是"显示时名并列 ID"的小改良，
    不计净增量。
  I=8：route-guard PLAN MODE 接线(+2)/parity 锚点(+2)/使用史极重(+2)/SSOT-10 checker(+1)/
  appendix 契约(+1)。
  C=M：narrowed merge scope（见下）触 plan-agent.md + PROGRESS 模板约定 2-3 文件；若含
  tracker 化则 L——已裁掉。
  E=3：promoted(+1)+CHANGELOG（decision-mapping→wayfinder 更名 rationale）(+1)+非 draft(+1)。

