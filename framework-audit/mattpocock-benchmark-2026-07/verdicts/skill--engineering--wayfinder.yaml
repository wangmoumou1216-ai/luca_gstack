  steelman_incumbent: |
    最强现任论证："我方已有四个未决事项持有区——brainstorm PRD 的 Outstanding Questions
    （blocking/deferred 双档 + gated handoff，brainstorm/SKILL.md:153,499 实查）、plan-agent
    的 DONE_WITH_CONCERNS defer 项、NEEDS_CONTEXT escalation、CONTEXT.md 假设风险——fog 只是
    第五个池子，merge 徒增'该放哪个池子'的路由噪音。"且 D=6 确有虚高：
    (a) single-ticket-per-session +1 违反本 benchmark 自己的"冲突不计缺口"先例——同一 verdict
    对 name-not-hash 因冲突记 +0，loop-me verdict 还明引"同 wayfinder name-vs-ID"为先例；
    single-ticket 与 Wave 内并行正面冲突（verdict 自己承认"适配性存疑"）却计 +1，按己例应 +0。
    (b) "机制簇整体缺席"言过其实——dossier 自认 frontier≈Wave 静态拓扑、destination≈topic/
    完成状态 loose equivalent，真正全缺的是 fog 持有区 + 渐进揭示范式。
    (c) frontier 语义在 to-tickets D 已计 +2，此处 fog 簇 +3 含部分重叠计分。
    诚实修正 D≈4-5。**为何不致命**：merge 门槛 = D≥3 + ≥2 条独立引证机制——fog 持有区
    （absence grep 0 命中）与 shared-map 均为真缺席、引文已机验，修正后仍稳过线且桶判据
    不动摇。"第五个池子"攻击被 merge_scope ② 的毕业判准直接消解：Outstanding Questions 按
    wayfinder 自己的判准（能否精确陈述，非能否回答）恰是"已锐化未回答"= ticket 级，与 fog
    收留的"提不成精确问题"项不同池，判据可执行不混淆。旁证：对方 CHANGELOG#464 亲证 matt
    本人把 wayfinder 定位为 situational on-ramp 而非主干入口（"crowning wayfinder as the
    default spine is a v2-sized move"）——verdict 只吸收概念层，与源头自我定位一致，非高估。
