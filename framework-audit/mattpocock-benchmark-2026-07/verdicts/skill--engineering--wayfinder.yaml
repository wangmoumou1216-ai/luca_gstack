    一等锚）+ fog 区（PROGRESS.md 增可选 "尚未锐化（fog）" 节——在 scope 内但还提不成
    精确问题的项，与"待执行"区分）+ frontier 语义（阻塞全清的 U-block，与 to-tickets
    merge ③ 共用一条）。
  ② 判据一行："雾 vs 任务"的毕业判准 = 能否现在精确陈述问题（非能否回答）——防把模糊项
    伪装成任务卡。
  ③ 不引入：每 session 单票上限（与 Wave 并行冲突）、name-not-ID（与 U-ID 冻结冲突）、
    tracker 地图（基础设施成本）。

