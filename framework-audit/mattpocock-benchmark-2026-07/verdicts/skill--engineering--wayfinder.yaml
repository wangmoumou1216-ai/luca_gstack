bucket_rationale: |
  rubric §3 补强合并：D=6 ≥ 3 ✓；机制 ≥2（fog-of-war 簇、shared-map 概念）✓。非替换：
  plan-agent 的断言列表（bash 可执行）、DEV/ASSERT 反向覆盖门、U-ID 冻结、模式分级（Solo→
  Hierarchical）是现任独有承重轴 → 支配不成立。
  **merge 范围刻意收窄**：只吸收 fog-of-war 概念层（词汇+PROGRESS 约定），不做 tracker 化
  ——tracker 承载地图需引入 issue-tracker 基础设施，触 Loop 宪法"优先接 harness 原生原语"
  与最小文件原则，成本/收益不成立；tracker 化按 opportunity 记录，不进落地提案。

merge_scope: |
