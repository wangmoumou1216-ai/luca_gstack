redteam:
  verdict: downgraded
  steelman_incumbent: |
    最强"够用/加噪音"论证：现任 tech-spec 的 Phase 4 追踪矩阵已对每条需求给"可执行测试准则"，
    Phase 3 接口合同已定"服务边界/IF-NNN/降级行为"——"在哪测/测什么"两轴我方已各有承载物；且
    **本轮 tdd verdict（bucket=adopt）刷新全局 ~/.claude/skills/tdd 已把 test-time seam 确认门带进
    生态**。于是对方 seam 机制的"我方全生态无 seam 概念"这一 D 支撑被本轮另一裁决部分抵消：
    to-spec 的 absence_proof 只 grep 了 `.claude/skills/office/tech-spec + brainstorm`（0 命中），
    **结构性排除了本轮即将拿到 seam 门的全局 tdd 安装**——absence 证据欠采样。
    为何不致命（不改判 leave）：即便扣掉 tdd 的 test-time seam，残留的 **spec-time seam 勾画**
    （起草工程合同前先择最高测试边界、趋向单一、deep-module 机会）在 tech-spec 里确无对应——
    matt 链路本就把"spec 时勾画(to-spec)"与"test 时确认(tdd)"分置两处，二者互补非冗余。叠加
    no-re-interview 的真缺口（见下），D 诚实仍 ≥3、≥2 条带引证机制、行为可保留（ab=1）→ merge
    桶成立，但 D=4 处天花板、且落地面此前超出 D 支撑 → 降级为"桶不变、scope 收缩"。
  attack_notes: |
    ①【D 天花板 + 与 tdd 同轮重复计分邻域】seam 机制 +2 是 D 最大分项，却：(a) 仅挂单一 delta 对
      （对方 seam 三引 vs 我方 0 命中），无"咬过人"实证（无 CHANGELOG/复现）——按 rubric §2"1 分=1 组
      双侧引文，咬过人 +1"本应封 +1；(b) 同一 seam 概念在 **tdd verdict 计 +1**、to-spec 计 +2，
      同轮两裁决用同一"我方无 seam"缺口各自取信；(c) absence_proof 欠采样全局 tdd 安装。→ 交付到
      tech-spec 的**净新增**实为 spec-time 残留（约 +1），非 +2。未强改分数（+2 对"richer 起源机制"
      尚可辩），但记录其处天花板、且落地必须限定 spec-time、不复制 tdd 的 test-time 确认门。
    ②【fit 冲突：headless orchestrator 卡点】原 merge_scope ① 的"AskUserQuestion 确认后再展开契约"
      向 tech-spec 内插一道强制人类卡点。tech-spec 会被 muse-loop-orchestrate dispatch（其 preamble
      注释自承"muse-loop 这类编排器可能一天内对多个 REQ 各跑一次"），编排器期望该节点跑到完成、
      人类卡点在 loop 边界(GATE-1/2)而非节点内。→ 已把确认门**条件化**（交互运行才 Ask、headless
      写清单不阻塞），避免与 orchestrator 设计冲突。
    ③【落地面收缩：砍 merge_scope ②】prototype-snippet 例外源自 spec-template-structure 机制（计分
      **+0**）、原文自标"可选一行"、且属 muse 专属原型→spec 流（与"tech-spec 为双仓共有核心 skill"的
      dual_repo:true 相冲，muse 专属子项不应双仓落）。落地范围超出 D 支撑 → 按"保守起见只删不加"移出
      落地面，归③不落地。收缩后落地仅①（收窄版），ab=1 未触 A/B 红线，dual_repo:true 干净成立。
    ④【未动项复核】no-re-interview（+1）是真缺口——tech-spec 缺正式 PRD(R/AE 编号)时 **硬 BLOCK**
      （Phase 0），而 matt to-spec 从裸对话直接合成；但该 +1 本就不在 merge_scope（无落地动作），
      不影响桶。承重墙：①加在 Phase 3 节内、不改 Phase 0→6 顺序 → 不触 P6；不改路径/frontmatter/
      handoff → 不触 P1/P2/P4。tracker +1 已正确归 gap 不在此落。
