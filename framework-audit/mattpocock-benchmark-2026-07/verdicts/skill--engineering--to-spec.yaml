score_derivation: |
  D=4：
  - seam-sketch-reuse-highest-seam：+2。写 spec 前显式勾画测试 seam（优先已有/用最高/理想
    仅一个/与用户确认）——counterpart 目录 grep 0 命中；tech-spec 有 IF-NNN 接口契约与逐
    需求测试判据，但无"选最高测试边界并与用户确认"的前置协商步。与 tdd verdict 的 seam 门
    同主题（那边管写测试时，这边管写 spec 时）。
  - no-re-interview-constraint：+1。"对话直接→spec、不重新访谈"的路径我方无单一对应
    （tech-spec 从书面上游合成✓但不吃裸对话；brainstorm 吃对话但要访谈；/idea 吃语料但
    出结构化需求非工程 spec）——形态缺口窄，计 1。
  - publish-to-tracker：+1（tracker 簇，归 GAP-issue-tracker-integration 统一裁，此处
    不落地）。
  - spec-template-structure：+0（我方锁定节+稳定 ID+覆盖率门更强；user-story 列表形态
    是取舍非缺口）。
  I=9：tech-spec P5 门禁+锁定节保护+使用史；brainstorm 同强。
  C=M。E=3（promoted+docs 页+非 draft）。

bucket: merge   # 红队复核后维持 merge，但落地 scope 收缩（详见 redteam 块 + merge_scope）
bucket_rationale: |
  rubric §3 补强合并：D=4 ≥ 3 ✓；机制 ≥2 ✓；加法。非替换：MUST 覆盖率验证门、追溯矩阵、
  稳定 ID 是现任独有承重轴，对方模板无任何覆盖率概念 → 支配不成立。
  【红队 downgraded 2026-07-12】桶不变（诚实 D 仍 ≥3：spec-time seam 残留 + no-re-interview 真缺口），
  但 scope 收缩：砍 merge_scope②（+0 机制的可选子项、muse 专属）、①确认门条件化+限定 spec-time
  （不复制本轮 tdd adopt 已带的 test-time seam 门）。D=4 处天花板、seam 与 tdd 同轮共用"我方无 seam"
  缺口（absence_proof 欠采样全局 tdd）——详见 redteam。

merge_scope: |
  【红队 downgrade 后收缩，2026-07-12】唯一落地项 = ①（收窄版）。
  ① tech-spec 增 seam 前置步（Phase 序不动，加在接口契约节内）：起草 IF-NNN 前先列测试
    seam 清单（优先已有 seam/取最高边界/趋向单一）——**限定为 spec-time 勾画，明确不复制
    tdd（本轮 adopt 刷新已带 test-time seam 确认门）的 test-time 确认**；与逐需求测试判据
    互补（判据管"测什么"，seam 管"在哪测"）。**确认门条件化**：交互（有用户在场）运行才
    AskUserQuestion 确认；编排器 headless 运行（muse-loop dispatch tech-spec）则把 seam 清单
    写入产出、不强阻塞——避免向 orchestrator 节点插入计划外人类卡点。
  ② 【红队砍除】prototype-snippet 例外：源机制 spec-template-structure 计分 +0、原判据标为
    "可选一行"、且为 muse 专属原型→spec 流（污染 dual_repo 判定）——落地范围超出 D 支撑，
    按"保守起见只删不加"移出落地面，归入不落地。
  ③ 不落地：tracker publish（归 gap 提案）、user-story 模板（取舍非缺口）、
    prototype-snippet 例外（见②，+0 机制不落地）。

