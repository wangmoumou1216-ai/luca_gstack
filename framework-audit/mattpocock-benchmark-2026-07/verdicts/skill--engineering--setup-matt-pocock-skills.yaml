score_derivation: |
  D=6（但增量分布见 bucket_rationale——多数属同一基础设施簇）：
  - tracker-agnostic-adapters：+2。可替换 issue-tracker 适配层（统一操作词汇，底层换 CLI）
    grep 0 命中——我方工作项活在 docs/** artifacts + 稳定 ID，无 tracker 抽象。
  - triage-label-vocabulary：+1。五规范角色→label 映射缺席（同簇）。
  - explore-before-configure：+1。prompt-driven 探索→呈现→确认→写入流程；我方 project.sh
    是确定性脚本 + CLAUDE.md"入场认知落盘"散文指令，无脚手架内侦察适配。
  - domain-doc-layout：+1。single/multi-context 可选布局（CONTEXT-MAP.md）缺席；我方固定
    single。
  - config-injection-into-agent-md：+1。幂等块注入已有 CLAUDE/AGENTS 缺席；我方 stdout 注入
    是不同且有意的机制。
  - recommend-answer-one-word-accept：+0（我方 AskUserQuestion 约定已"推荐项置首"，
    Project Gate 已"确认最多 1 句话"——同构已有）。
  I=10：project.sh + 三软链 + session-restore/project-scope-guard 接线 + 专属回归测试
  （test-project-scope-guard.mjs）——现任是框架最重的基础设施之一。
  C=L：tracker 抽象是基础设施级触面。E=3。

bucket: leave
bucket_rationale: |
  D=6 机械达标 merge 必要条件，但 judge 裁定 leave + 升 gap 提案，理由显式记录（供 P3 红队
  攻击与 GATE-2 复核）：
  ① 增量的 4/6 分属**同一基础设施簇**——"要不要一个 tracker 承载的工作项层"。这不是某个
    skill 的补强，是框架级架构选择（我方现行 docs/**+稳定ID+handoff 是 Skill-first 的承重
    设计）。按 F6 纪律（候选只能映射 open gap；无 gap → 先提案 gap、人裁 gap、候选下轮
    再入）——**先裁 gap 再谈采纳**，不得由单个 skill verdict 后门引入基础设施。
  ② 同簇证据横跨 4 个单元（to-spec 的 publish、to-tickets 的 native blocking、triage 的
    label 状态机、wayfinder 的 tracker 地图）——聚合成一个 gap 提案比四处零散 merge 诚实。
  ③ 簇外余量（explore-before-configure/domain-doc-layout/config-injection，D 合计 3）
    独立价值低：project.sh 确定性 + CLAUDE.md 入场认知落盘已覆盖主职能，multi-context 无
    现实需求（我方项目结构单 context）。

