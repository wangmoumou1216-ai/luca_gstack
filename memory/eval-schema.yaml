# Eval Record Schema v1.0
# 每次 skill 执行后由 record_eval.py 写入 memory/evals/eval-log.jsonl
# 目的：为将来的 GEPA 自动优化积累结构化训练数据

fields:
  session_date:
    type: string
    format: "YYYY-MM-DD"
    required: true

  skill_name:
    type: string
    required: true
    examples: [brainstorm, deepresearch, html-prototype, ux-research]

  topic:
    type: string
    required: true
    description: "来自 .claude/current-topic.txt"

  scene:
    type: string
    enum: [A, B, C, D, unknown]
    required: false
    default: unknown

  input_summary:
    type: string
    max_chars: 300
    required: false
    description: "用户原始需求的简短摘要（不是 PRD，是输入意图）"

  output_paths:
    type: array
    items: string
    required: true
    description: "skill 产出的文件路径列表（来自 WA 完成报告的 outputs_produced）"

  quality_gate_score:
    type: number
    min: 0
    max: 10
    required: false
    nullable: true
    description: "quality-gate 报告中的 Score 字段"

  quality_gate_status:
    type: string
    enum: [PASS, FAIL, CONDITIONAL_PASS]
    required: true

  quality_gate_findings:
    type: array
    items: string
    required: false
    description: "quality-gate 报告的 Findings 列表（只记录 FAIL / WARN 项）"

  execution_duration_est:
    type: string
    enum: [lightweight, medium, heavy]
    required: false
    default: medium
    description: "lightweight=<2K tokens, medium=2K-20K, heavy=>20K"

  user_adopted:
    type: string
    enum: ["true", "false", unknown]
    required: false
    default: unknown
    description: "产出是否被用户实际采用（可在 session 结束后手动更新）"

storage:
  path: "memory/evals/eval-log.jsonl"
  format: jsonl
  rotation: none  # 单文件追加，按 session_date 过滤
  index_by: [skill_name, session_date, quality_gate_status]

# ─────────────────────────────────────────────────────────────────────────
# Routing eval 扩展（2026-07-12）：甲类语义路由命中率度量，由 eval_routing.py 产出。
# 向后兼容——现有 skill-exec 记录无这些字段、不受影响；GEPA pairs 层不涉及（冻结，见 README:66）。
# fixtures 在 memory/evals/routing/fixtures.jsonl；judge 工作单/结果在同目录。
# ─────────────────────────────────────────────────────────────────────────
routing_eval_fields:
  eval_kind:
    type: string
    enum: [routing]
    description: "标记路由命中率记录（区别于上方 skill-exec 记录，后者无此字段）"
  input:
    type: string
    description: "自然语言请求（fixture 输入意图）"
  expected_capability:
    type: string
    description: "该命中的能力：/skill | PLAN_MODE | project:switch | special:* | direct 等"
  actual_capability:
    type: string
    description: "实际路由到的能力（keyword 层=route-guard 输出映射；semantic 层=judge 判模型路由）"
  routing_layer:
    type: string
    enum: [keyword, semantic]
    description: "keyword=route-guard 确定性达（grader:code）；semantic=靠模型判断（grader:llm-judge）"
  verdict:
    type: string
    enum: [pass, fail]
    nullable: true
    description: "semantic 层由 llm-judge 回填 pass/fail；keyword 层由 grader:code 确定"
